<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>{{title}}</title>

<style>

body{
    margin:0;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:500px;
    background:#fff;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.12);
    overflow:hidden;
}

.header{
    background:#0B5ED7;
    color:white;
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
}

.content{
    padding:50px;
    text-align:center;
}

.icon{
    font-size:70px;
    color:#28a745;
}

h2{
    margin-top:20px;
    color:#333;
}

p{
    color:#666;
    line-height:28px;
    font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">
IMARG Maps
</div>

<div class="content">

<div class="icon">
{{icon}}
</div>

<h2>{{title}}</h2>

<p>
{{message}}
</p>

</div>

</div>

</div>

</body>

</html>
